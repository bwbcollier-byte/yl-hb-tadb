version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    commit-message:
      prefix: "ci"
      include: "scope"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "deps"
      include: "scope"
    groups:
      types:
        patterns: ["@types/*"]
      eslint:
        patterns: ["eslint*", "@typescript-eslint/*"]
      typescript:
        patterns: ["typescript", "ts-node", "tsx"]
