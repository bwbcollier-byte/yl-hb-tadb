name: AudioDB Artist Enrichment

on:
  workflow_dispatch:
  schedule:
    # Run twice daily at 4 AM and 4 PM UTC
    - cron: "0 4,16 * * *"

jobs:
  enrich:
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Install Dependencies
        run: npm install

      - name: Run AudioDB Enrichment
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          TADB_API_KEY: ${{ secrets.TADB_API_KEY }}
        run: node enrich-tadb.js
